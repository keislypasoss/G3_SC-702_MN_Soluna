<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restablecer Contraseña - Soluna</title>
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .bg-gradient-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 5px;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block" style="background: url('img/logo-soluna.png.png') center/cover;"></div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-2">Restablecer Contraseña</h1>
                                        <p class="mb-4" id="mensajeBienvenida">Cargando...</p>
                                    </div>
                                    
                                    <div id="formularioContainer" style="display: none;">
                                        <form class="user" id="formRestablecer">
                                            <div class="form-group">
                                                <input type="password" class="form-control form-control-user"
                                                    id="nuevaPassword" placeholder="Nueva Contraseña" required minlength="6">
                                                <div class="password-strength" id="passwordStrength"></div>
                                            </div>
                                            <div class="form-group">
                                                <input type="password" class="form-control form-control-user"
                                                    id="confirmarPassword" placeholder="Confirmar Contraseña" required minlength="6">
                                            </div>
                                            <small class="form-text text-muted mb-3">
                                                <i class="fas fa-info-circle"></i> La contraseña debe tener al menos 6 caracteres, por favor cumpla con lo solicitado
                                            </small>
                                            <button type="submit" class="btn btn-primary btn-user btn-block">
                                                <i class="fas fa-key"></i> Restablecer Contraseña
                                            </button>
                                        </form>
                                    </div>

                                    <div id="errorContainer" style="display: none;" class="text-center">
                                        <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
                                        <p id="mensajeError" class="text-danger"></p>
                                        <a href="index.html" class="btn btn-secondary btn-user">
                                            Volver al inicio
                                        </a>
                                    </div>

                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="index.html">Volver a iniciar sesión</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/restablecer-password.js"></script>
</body>
</html>
